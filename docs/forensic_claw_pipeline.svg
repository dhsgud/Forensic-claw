<svg width="680" viewBox="0 0 680 588" role="img" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, 'Segoe UI', 'Malgun Gothic', sans-serif">
<title>Forensic-Claw 처리 파이프라인</title>
<desc>채널에서 들어온 메시지가 MessageBus를 거쳐 AgentLoop의 전처리, 컨텍스트 빌드, LLM-도구 반복 루프, 응답 정규화를 지나 다시 채널로 나가며, 도구 레지스트리와 지식 RAG/그래프 계층이 반복 루프에 연결된다.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>
<style>
.th{font-weight:600;font-size:14px}
.ts{font-weight:400;font-size:12px}
.arr{stroke:#888780;stroke-width:1.5;fill:none}
</style>

<g>
<rect x="40" y="46" width="310" height="50" rx="10" fill="#F1EFE8" stroke="#5F5E5A"/>
<text class="th" x="195" y="70" text-anchor="middle" fill="#2C2C2A">채널 (Channels)</text>
<text class="ts" x="195" y="87" text-anchor="middle" fill="#5F5E5A">discord · kakaotalk · webui · cli</text>
</g>

<g>
<rect x="40" y="116" width="310" height="46" rx="10" fill="#F1EFE8" stroke="#5F5E5A"/>
<text class="th" x="195" y="138" text-anchor="middle" fill="#2C2C2A">MessageBus</text>
<text class="ts" x="195" y="154" text-anchor="middle" fill="#5F5E5A">Inbound ⇆ Outbound 메시지</text>
</g>

<g>
<rect x="40" y="182" width="310" height="56" rx="10" fill="#EEEDFE" stroke="#534AB7"/>
<text class="th" x="195" y="206" text-anchor="middle" fill="#26215C">1. 전처리 훅</text>
<text class="ts" x="195" y="224" text-anchor="middle" fill="#534AB7">슬래시 · 자동 RAG · 백그라운드 · 세션 압축</text>
</g>

<g>
<rect x="40" y="258" width="310" height="44" rx="10" fill="#EEEDFE" stroke="#534AB7"/>
<text class="th" x="195" y="278" text-anchor="middle" fill="#26215C">2. 컨텍스트 빌드</text>
<text class="ts" x="195" y="294" text-anchor="middle" fill="#534AB7">system + skills + memory + history</text>
</g>

<g>
<rect x="40" y="322" width="310" height="72" rx="10" fill="#E1F5EE" stroke="#0F6E56"/>
<text class="th" x="195" y="346" text-anchor="middle" fill="#04342C">3. Agent 반복 루프 (최대 40회)</text>
<text class="ts" x="195" y="365" text-anchor="middle" fill="#0F6E56">LLM 호출 ⇄ 도구 병렬 실행</text>
<text class="ts" x="195" y="382" text-anchor="middle" fill="#0F6E56">예산 초과 시 프롬프트 자동 압축</text>
</g>

<g>
<rect x="40" y="414" width="310" height="52" rx="10" fill="#EEEDFE" stroke="#534AB7"/>
<text class="th" x="195" y="436" text-anchor="middle" fill="#26215C">4. 응답 정규화 · 세션 저장</text>
<text class="ts" x="195" y="453" text-anchor="middle" fill="#534AB7">한국어 강제 · thinking/graph 수집</text>
</g>

<g>
<rect x="370" y="322" width="270" height="72" rx="10" fill="#F1EFE8" stroke="#5F5E5A"/>
<text class="th" x="505" y="346" text-anchor="middle" fill="#2C2C2A">도구 레지스트리</text>
<text class="ts" x="505" y="365" text-anchor="middle" fill="#5F5E5A">file · exec · web · hash · message</text>
<text class="ts" x="505" y="382" text-anchor="middle" fill="#5F5E5A">spawn · cron · registry · MCP</text>
</g>

<g>
<rect x="370" y="414" width="270" height="150" rx="10" fill="#FAECE7" stroke="#993C1D"/>
<text class="th" x="386" y="438" text-anchor="start" fill="#4A1B0C">지식 RAG + 그래프 (SQLite)</text>
<text class="th" x="386" y="468" text-anchor="start" fill="#4A1B0C">ingest</text>
<text class="ts" x="386" y="486" text-anchor="start" fill="#993C1D">청킹 → 임베딩 → 엔티티 추출</text>
<text class="th" x="386" y="514" text-anchor="start" fill="#4A1B0C">search</text>
<text class="ts" x="386" y="532" text-anchor="start" fill="#993C1D">벡터 + 키워드 → graphView</text>
<text class="ts" x="386" y="554" text-anchor="start" fill="#993C1D">Chrome History · 로그 · CSV</text>
</g>

<line class="arr" x1="195" y1="96" x2="195" y2="116" marker-end="url(#arrow)"/>
<line class="arr" x1="195" y1="162" x2="195" y2="182" marker-end="url(#arrow)"/>
<line class="arr" x1="195" y1="238" x2="195" y2="258" marker-end="url(#arrow)"/>
<line class="arr" x1="195" y1="302" x2="195" y2="322" marker-end="url(#arrow)"/>
<line class="arr" x1="195" y1="394" x2="195" y2="414" marker-end="url(#arrow)"/>

<line class="arr" x1="350" y1="358" x2="370" y2="358" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
<line class="arr" x1="505" y1="394" x2="505" y2="414" marker-end="url(#arrow)"/>

<path class="arr" d="M40 440 H26 V71 H40" marker-end="url(#arrow)"/>
<text class="ts" transform="rotate(-90 16 258)" x="16" y="258" text-anchor="middle" fill="#888780">OutboundMessage</text>
</svg>
