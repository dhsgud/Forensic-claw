<svg width="680" viewBox="0 0 680 556" role="img" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, 'Segoe UI', 'Malgun Gothic', sans-serif">
<title>반복 루프 예산 압축 (_fit_to_budget)</title>
<desc>발신 메시지를 도구 결과 컴팩트로 줄인 뒤 프롬프트 토큰이 예산 이내면 그대로 전송하고, 초과하면 질문 고정, 오래된 tool 그룹 드롭, tool 결과 stub 순으로 압축해 LLM에 전송한다.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>
<style>
.th{font-weight:600;font-size:14px}
.ts{font-weight:400;font-size:12px}
.arr{stroke:#888780;stroke-width:1.5;fill:none}
</style>

<g>
<rect x="60" y="40" width="380" height="46" rx="10" fill="#F1EFE8" stroke="#5F5E5A"/>
<text class="th" x="250" y="68" text-anchor="middle" fill="#2C2C2A">outgoing = messages + tool 정의</text>
</g>

<g>
<rect x="60" y="104" width="380" height="64" rx="10" fill="#E1F5EE" stroke="#0F6E56"/>
<text class="th" x="250" y="126" text-anchor="middle" fill="#04342C">도구 결과 컴팩트 (_compact_tool_content)</text>
<text class="ts" x="250" y="144" text-anchor="middle" fill="#0F6E56">knowledge_search → graphView/graph 제거, hits 상위 8</text>
<text class="ts" x="250" y="160" text-anchor="middle" fill="#0F6E56">16,000자 초과 결과 자르기</text>
</g>

<g>
<rect x="60" y="186" width="380" height="58" rx="10" fill="#FAEEDA" stroke="#854F0B"/>
<text class="th" x="250" y="210" text-anchor="middle" fill="#412402">프롬프트 토큰 ≤ 예산 이내?</text>
<text class="ts" x="250" y="228" text-anchor="middle" fill="#854F0B">예산 = 컨텍스트 − 응답토큰 − 1024</text>
</g>

<g>
<rect x="470" y="191" width="170" height="48" rx="10" fill="#EAF3DE" stroke="#3B6D11"/>
<text class="th" x="555" y="213" text-anchor="middle" fill="#173404">그대로 전송</text>
<text class="ts" x="555" y="230" text-anchor="middle" fill="#3B6D11">압축 생략</text>
</g>

<g>
<rect x="60" y="272" width="380" height="50" rx="10" fill="#EEEDFE" stroke="#534AB7"/>
<text class="th" x="250" y="294" text-anchor="middle" fill="#26215C">① system + 마지막 질문 고정</text>
<text class="ts" x="250" y="311" text-anchor="middle" fill="#534AB7">이전 히스토리는 앵커에서 제외</text>
</g>

<g>
<rect x="60" y="344" width="380" height="50" rx="10" fill="#EEEDFE" stroke="#534AB7"/>
<text class="th" x="250" y="366" text-anchor="middle" fill="#26215C">② 오래된 tool 그룹 드롭</text>
<text class="ts" x="250" y="383" text-anchor="middle" fill="#534AB7">최근 2개 그룹은 항상 보존</text>
</g>

<g>
<rect x="60" y="416" width="380" height="50" rx="10" fill="#EEEDFE" stroke="#534AB7"/>
<text class="th" x="250" y="438" text-anchor="middle" fill="#26215C">③ 최후: tool 결과 stub 치환</text>
<text class="ts" x="250" y="455" text-anchor="middle" fill="#534AB7">마지막 결과 제외하고 생략 표시</text>
</g>

<g>
<rect x="60" y="488" width="380" height="46" rx="10" fill="#EAF3DE" stroke="#3B6D11"/>
<text class="th" x="250" y="516" text-anchor="middle" fill="#173404">예산 내 프롬프트 → LLM 전송</text>
</g>

<line class="arr" x1="250" y1="86" x2="250" y2="104" marker-end="url(#arrow)"/>
<line class="arr" x1="250" y1="168" x2="250" y2="186" marker-end="url(#arrow)"/>
<line class="arr" x1="250" y1="244" x2="250" y2="272" marker-end="url(#arrow)"/>
<text class="ts" x="262" y="264" text-anchor="start" fill="#888780">아니오</text>
<line class="arr" x1="440" y1="215" x2="470" y2="215" marker-end="url(#arrow)"/>
<text class="ts" x="455" y="208" text-anchor="middle" fill="#888780">예</text>
<line class="arr" x1="250" y1="322" x2="250" y2="344" marker-end="url(#arrow)"/>
<line class="arr" x1="250" y1="394" x2="250" y2="416" marker-end="url(#arrow)"/>
<line class="arr" x1="250" y1="466" x2="250" y2="488" marker-end="url(#arrow)"/>
</svg>
