<svg width="680" viewBox="0 0 680 700" role="img" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, 'Segoe UI', 'Malgun Gothic', sans-serif">
<title>지식 RAG ingest 세부 (ingest_path / _ingest_file)</title>
<desc>파일을 순회하며 Chrome History DB인지 텍스트 로그인지 분기해 각각 청킹과 그래프 노드화를 수행한 뒤, 공통으로 임베딩과 그래프 저장을 거쳐 KnowledgeIngestResult를 반환한다.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>
<style>
.th{font-weight:600;font-size:14px}
.ts{font-weight:400;font-size:12px}
.arr{stroke:#888780;stroke-width:1.5;fill:none}
</style>

<g>
<rect x="120" y="40" width="440" height="46" rx="10" fill="#F1EFE8" stroke="#5F5E5A"/>
<text class="th" x="340" y="68" text-anchor="middle" fill="#2C2C2A">ingest_path(파일 또는 디렉터리)</text>
</g>

<g>
<rect x="120" y="104" width="440" height="60" rx="10" fill="#F1EFE8" stroke="#5F5E5A"/>
<text class="th" x="340" y="128" text-anchor="middle" fill="#2C2C2A">파일 순회 (_iter_files)</text>
<text class="ts" x="340" y="146" text-anchor="middle" fill="#5F5E5A">글롭 매칭 · skip dirs · max_files · max_file_bytes 체크</text>
</g>

<g>
<rect x="120" y="184" width="440" height="56" rx="10" fill="#FAEEDA" stroke="#854F0B"/>
<text class="th" x="340" y="208" text-anchor="middle" fill="#412402">Chrome History DB 인가?</text>
<text class="ts" x="340" y="226" text-anchor="middle" fill="#854F0B">urls · visits 테이블 존재 여부로 판별</text>
</g>

<text class="ts" x="185" y="262" text-anchor="middle" fill="#888780">아니오 · 텍스트 로그</text>
<text class="ts" x="495" y="262" text-anchor="middle" fill="#888780">예 · Chrome History</text>

<g>
<rect x="40" y="274" width="290" height="46" rx="10" fill="#FAECE7" stroke="#993C1D"/>
<text class="th" x="185" y="296" text-anchor="middle" fill="#4A1B0C">인코딩 감지</text>
<text class="ts" x="185" y="313" text-anchor="middle" fill="#993C1D">utf-8 / cp949 / 자동 탐지</text>
</g>
<g>
<rect x="40" y="336" width="290" height="46" rx="10" fill="#FAECE7" stroke="#993C1D"/>
<text class="th" x="185" y="358" text-anchor="middle" fill="#4A1B0C">6,000자 청킹</text>
<text class="ts" x="185" y="375" text-anchor="middle" fill="#993C1D">overlap 400자</text>
</g>
<g>
<rect x="40" y="398" width="290" height="60" rx="10" fill="#FAECE7" stroke="#993C1D"/>
<text class="th" x="185" y="420" text-anchor="middle" fill="#4A1B0C">정규식 엔티티 추출</text>
<text class="ts" x="185" y="438" text-anchor="middle" fill="#993C1D">IP · URL · Domain · FilePath</text>
<text class="ts" x="185" y="453" text-anchor="middle" fill="#993C1D">Registry · Executable → MENTIONS</text>
</g>

<g>
<rect x="350" y="274" width="290" height="46" rx="10" fill="#FAECE7" stroke="#993C1D"/>
<text class="th" x="495" y="296" text-anchor="middle" fill="#4A1B0C">DB 안전 복사</text>
<text class="ts" x="495" y="313" text-anchor="middle" fill="#993C1D">잠긴 원본 대신 임시본 사용</text>
</g>
<g>
<rect x="350" y="336" width="290" height="46" rx="10" fill="#FAECE7" stroke="#993C1D"/>
<text class="th" x="495" y="358" text-anchor="middle" fill="#4A1B0C">urls ⨝ visits 쿼리</text>
<text class="ts" x="495" y="375" text-anchor="middle" fill="#993C1D">최근 방문순 · max_chrome_rows</text>
</g>
<g>
<rect x="350" y="398" width="290" height="60" rx="10" fill="#FAECE7" stroke="#993C1D"/>
<text class="th" x="495" y="420" text-anchor="middle" fill="#4A1B0C">URL / Domain 그래프화</text>
<text class="ts" x="495" y="438" text-anchor="middle" fill="#993C1D">VISITED_URL · HAS_DOMAIN</text>
<text class="ts" x="495" y="453" text-anchor="middle" fill="#993C1D">row 단위 청크 생성</text>
</g>

<g>
<rect x="80" y="490" width="520" height="58" rx="10" fill="#E1F5EE" stroke="#0F6E56"/>
<text class="th" x="340" y="514" text-anchor="middle" fill="#04342C">임베딩 (_embed_chunks)</text>
<text class="ts" x="340" y="532" text-anchor="middle" fill="#0F6E56">embedder ready → /v1/embeddings, 아니면 키워드 전용으로 강등</text>
</g>

<g>
<rect x="80" y="568" width="520" height="58" rx="10" fill="#EEEDFE" stroke="#534AB7"/>
<text class="th" x="340" y="592" text-anchor="middle" fill="#26215C">그래프 · 청크 저장 (SQLite)</text>
<text class="ts" x="340" y="610" text-anchor="middle" fill="#534AB7">Case · Investigator · Source 관계 + add_chunks</text>
</g>

<g>
<rect x="80" y="646" width="520" height="46" rx="10" fill="#EAF3DE" stroke="#3B6D11"/>
<text class="th" x="340" y="668" text-anchor="middle" fill="#173404">KnowledgeIngestResult</text>
<text class="ts" x="340" y="685" text-anchor="middle" fill="#3B6D11">chunks · entities · relationships · embedded</text>
</g>

<line class="arr" x1="340" y1="86" x2="340" y2="104" marker-end="url(#arrow)"/>
<line class="arr" x1="340" y1="164" x2="340" y2="184" marker-end="url(#arrow)"/>
<path class="arr" d="M200 240 V274" marker-end="url(#arrow)"/>
<path class="arr" d="M480 240 V274" marker-end="url(#arrow)"/>
<line class="arr" x1="185" y1="320" x2="185" y2="336" marker-end="url(#arrow)"/>
<line class="arr" x1="185" y1="382" x2="185" y2="398" marker-end="url(#arrow)"/>
<line class="arr" x1="495" y1="320" x2="495" y2="336" marker-end="url(#arrow)"/>
<line class="arr" x1="495" y1="382" x2="495" y2="398" marker-end="url(#arrow)"/>
<path class="arr" d="M185 458 V474 H340 V490" marker-end="url(#arrow)"/>
<path class="arr" d="M495 458 V474 H340" />
<line class="arr" x1="340" y1="548" x2="340" y2="568" marker-end="url(#arrow)"/>
<line class="arr" x1="340" y1="626" x2="340" y2="646" marker-end="url(#arrow)"/>
</svg>
