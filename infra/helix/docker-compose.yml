name: forensic-claw-helix

# This compose file starts the HelixDB image generated by `helix build dev`.
# Run `helix check dev` and `helix build dev` first, or use `start.ps1`.
services:
  app:
    build:
      context: ./.helix/dev
      dockerfile: Dockerfile
    image: helix-forensic-claw-knowledge-dev:dev
    container_name: helix-forensic-claw-knowledge-dev_app
    restart: unless-stopped
    ports:
      - "0.0.0.0:${HELIX_HOST_PORT:-6969}:${HELIX_CONTAINER_PORT:-6969}"
    volumes:
      - ./.helix/.volumes/dev:/data
    environment:
      HELIX_PORT: "${HELIX_CONTAINER_PORT:-6969}"
      HELIX_DATA_DIR: /data
      HELIX_INSTANCE: dev
      HELIX_PROJECT: forensic-claw-knowledge
    networks:
      - forensic-claw-helix

networks:
  forensic-claw-helix:
    driver: bridge
